<div class="box-body table-responsive no-padding">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>FULL NAME</th>
          <th>COMPANY</th>
          <th>EMAIL</th>
          <th>TELEPHONE</th>
          <th>TYPE OF DONATION</th>
          <th>PLACE TO DONATE</th>
         
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let w of donorss; index as i">
          <td>{{i + 1}}</td>
          <td>{{w.fullname}}</td>
          <td>{{w.company}}</td>
          <td>{{w.email}}</td>
          <td>{{w.phone}}</td>
          <td>{{w.typeofdonation}}</td>
          <td>{{w.placedonation}}</td>

        </tr>

      </tbody>

    </table>
  </div>
  <!-- /.box-body -->
